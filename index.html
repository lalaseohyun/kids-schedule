        // 드래그 앤 드롭 핸들러
        function handleDragStart(e, day, idx) {
            e.stopPropagation();
            draggedEvent = { day, idx };
            draggedEventElement = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            draggedEvent = null;
            draggedEventElement = null;
            
            // 모든 드래그 오버 효과 제거
            document.querySelectorAll('.drag-over').forEach(el => {
                el.classList.remove('drag-over');
            });
        }

        function handleDragOver(e) {
            if (!draggedEvent) return;
            e.preventDefault();
            e.stopPropagation();
            e.dataTransfer.dropEffect = 'move';
            
            const slot = e.currentTarget;
            if (!slot.classList.contains('drag-over')) {
                slot.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e, targetDay, targetHour) {
            e.preventDefault();
            e.stopPropagation();
            e.currentTarget.classList.remove('drag-over');
            
            if (!draggedEvent) return;

            const userKey = currentChildId || `${currentUser.nickname}-${currentUser.phone}`;
            const sourceDay = draggedEvent.day;
            const sourceIdx = draggedEvent.idx;
            
            // 같은 위치면 무시
            if (sourceDay === targetDay && 
                appData.schedules[userKey][sourceDay][sourceIdx].startTime.startsWith(String(targetHour).padStart(2, '0'))) {
                return;
            }
            
            // 원본 일정 가져오기
            const originalEvent = appData.schedules[userKey][sourceDay][sourceIdx];
            
            // 시간 차이 계산
            const oldStartHour = parseInt(originalEvent.startTime.split(':')[0]);
            const oldStartMin = parseInt(originalEvent.startTime.split(':')[1]);
            const oldEndHour = parseInt(originalEvent.endTime.split(':')[0]);
            const oldEndMin = parseInt(originalEvent.endTime.split(':')[1]);
            
            const duration = (oldEndHour * 60 + oldEndMin) - (oldStartHour * 60 + oldStartMin);
            
            // 새 시간 설정 (같은 분 유지)
            const newStartTime = `${String(targetHour).padStart(2, '0')}:${String(oldStartMin).padStart(2, '0')}`;
            const newEndMinutes = targetHour * 60 + oldStartMin + duration;
            const newEndHour = Math.floor(newEndMinutes / 60);
            const newEndMin = newEndMinutes % 60;
            const newEndTime = `${String(newEndHour).padStart(2, '0')}:${String(newEndMin).padStart(2, '0')}`;
            
            // 새 일정 생성
            const newEvent = {
                ...originalEvent,
                startTime: newStartTime,
                endTime: newEndTime
            };
            
            // 원본 삭제
            appData.schedules[userKey][sourceDay].splice(sourceIdx, 1);
            
            // 새 위치에 추가
            appData.schedules[userKey][targetDay].push(newEvent);
            appData.schedules[userKey][targetDay].sort((a, b) => a.startTime.localeCompare(b.startTime));
            
            saveData();
            renderCalendar();
        }

        // 1교시 시작시간 기준으로 전체 교시 자동계산
        function autoCalcPeriods() {
            const startVal = document.getElementById('autoStartTime')?.value?.trim();
            if (!startVal || !/^\d{1,2}:\d{2}$/.test(startVal)) {
                alert('시작 시간을 올바르게 입력해주세요. 예) 08:50');
                return;
            }
            function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
            function fromMin(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }

            // lunchAfter: 몇 번째 교시 다음에 점심인지 (1-based)
            const lunchAfter = parseInt(document.getElementById('lunchPosition')?.value || '3');

            // 교시 수 파악
            let total = 0;
            while (document.getElementById(`period-${total}-start`)) total++;

            // 점심 길이: 현재 입력된 점심 시간 기준으로 미리 계산, 이상하면 50분
            const lsEl = document.getElementById('lunch-start');
            const leEl = document.getElementById('lunch-end');
            let lunchDur = 50;
            if (lsEl?.value?.includes(':') && leEl?.value?.includes(':')) {
                const d = toMin(leEl.value) - toMin(lsEl.value);
                if (d > 10 && d < 180) lunchDur = d;
            }

            let cur = toMin(startVal);

            for (let idx = 0; idx < total; idx++) {
                // idx는 0-based, lunchAfter는 1-based
                // → lunchAfter번째 교시(idx = lunchAfter-1) 직후에 점심 삽입
                // → idx = lunchAfter 일 때 점심 먼저 삽입
                if (idx === lunchAfter) {
                    if (lsEl) lsEl.value = fromMin(cur);
                    if (leEl) leEl.value = fromMin(cur + lunchDur);
                    cur += lunchDur;
                }

                document.getElementById(`period-${idx}-start`).value = fromMin(cur);
                document.getElementById(`period-${idx}-end`).value   = fromMin(cur + 40);
                cur += 40; // 수업 40분

                // 쉬는시간 10분: 마지막 교시 제외, 점심 직전 교시(idx+1 === lunchAfter)는 제외
                const isLast = (idx === total - 1);
                const beforeLunch = (idx + 1 === lunchAfter);
                if (!isLast && !beforeLunch) cur += 10;
            }
        }

        // 점심 위치 변경 시 점심 시간 자동 업데이트
        function onLunchPositionChange() {
            const lunchAfter = parseInt(document.getElementById('lunchPosition')?.value || '3');
            // 선택한 교시(lunchAfter번째)의 끝 시간을 읽어서 점심 시작으로 세팅
            const prevPeriodEndEl = document.getElementById(`period-${lunchAfter - 1}-end`);
            if (!prevPeriodEndEl) return;
            const prevEnd = prevPeriodEndEl.value.trim();
            if (!prevEnd || !prevEnd.includes(':')) return;

            // 점심 시작 = 바로 앞 교시 끝 시간
            const lunchStartEl = document.getElementById('lunch-start');
            const lunchEndEl   = document.getElementById('lunch-end');
            if (!lunchStartEl || !lunchEndEl) return;

            // 점심 길이 유지 (현재 점심 길이 계산)
            function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
            function fromMin(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
            const oldStart = lunchStartEl.value.trim();
            const oldEnd   = lunchEndEl.value.trim();
            const lunchDur = (oldStart && oldEnd && oldStart.includes(':') && oldEnd.includes(':'))
                ? toMin(oldEnd) - toMin(oldStart) : 50;

            lunchStartEl.value = prevEnd;
            lunchEndEl.value   = fromMin(toMin(prevEnd) + lunchDur);
        }

        function saveScheduleSettings() {
            const userKey = currentChildId || `${currentUser.nickname}-${currentUser.phone}`;
            const userInfo = getUserInfo(currentUser.nickname, currentUser.phone);
            const currentChild = currentChildId
                ? userInfo.children?.find(c => c.id === currentChildId)
                : userInfo;
            const grade = currentChild ? parseInt(currentChild.grade) : 1;
            const basePeriods = gradeSchedules[grade] || gradeSchedules['1'];

            function isValidTime(val) {
                if (!val || !/^\d{1,2}:\d{2}$/.test(val)) return false;
                const [h, m] = val.split(':').map(Number);
                return h >= 6 && h <= 22 && m >= 0 && m <= 59;
            }
            function padTime(t) {
                const [h, m] = t.split(':');
                return `${String(h).padStart(2,'0')}:${m}`;
            }

            // 화면에 렌더된 교시 필드 수 기준으로 수집 (basePeriods 대신)
            const allClassPeriods = basePeriods.filter(p => p.period !== '점심');
            let renderedCount = 0;
            while (document.getElementById(`period-${renderedCount}-start`)) renderedCount++;

            // 교시 이름 목록 (렌더된 수만큼)
            const periodNames = allClassPeriods.slice(0, renderedCount).map(p => p.period);

            // 교시 시간 수집
            const collectedPeriods = [];
            let hasError = false;
            for (let idx = 0; idx < renderedCount; idx++) {
                const sv = document.getElementById(`period-${idx}-start`)?.value?.trim();
                const ev = document.getElementById(`period-${idx}-end`)?.value?.trim();
                const startEl = document.getElementById(`period-${idx}-start`);
                const endEl   = document.getElementById(`period-${idx}-end`);
                const svOk = isValidTime(sv), evOk = isValidTime(ev);
                if (!svOk || !evOk) {
                    hasError = true;
                    if (startEl) startEl.style.border = svOk ? '1px solid #ddd' : '2px solid red';
                    if (endEl)   endEl.style.border   = evOk ? '1px solid #ddd' : '2px solid red';
                } else {
                    collectedPeriods.push({ period: periodNames[idx] || `${idx+1}교시`, start: padTime(sv), end: padTime(ev) });
                }
            }

            // 점심 시간 수집
            const lunchSv = document.getElementById('lunch-start')?.value?.trim();
            const lunchEv = document.getElementById('lunch-end')?.value?.trim();
            const lunchStartEl = document.getElementById('lunch-start');
            const lunchEndEl   = document.getElementById('lunch-end');
            const lunchSvOk = isValidTime(lunchSv), lunchEvOk = isValidTime(lunchEv);
            if (!lunchSvOk || !lunchEvOk) {
                hasError = true;
                if (lunchStartEl) lunchStartEl.style.border = lunchSvOk ? '1px solid #ddd' : '2px solid red';
                if (lunchEndEl)   lunchEndEl.style.border   = lunchEvOk ? '1px solid #ddd' : '2px solid red';
            }

            if (hasError) {
                showAlert('⚠️ 입력 오류', '빨간 테두리 항목을 24시간제로 올바르게 입력해주세요.\n예) 오후 1시 → 13:00');
                return;
            }

            // 점심 위치 반영: N교시 후에 점심 삽입
            const lunchAfter = parseInt(document.getElementById('lunchPosition')?.value || '3');
            const lunchEntry = { period: '점심', start: padTime(lunchSv), end: padTime(lunchEv) };
            const finalPeriods = [
                ...collectedPeriods.slice(0, lunchAfter),
                lunchEntry,
                ...collectedPeriods.slice(lunchAfter)
            ];

            appData.customSchedule[userKey] = finalPeriods;
            // 오후 표시방식 저장
            const afternoonModeEl = document.querySelector('input[name="afternoonDisplay"]:checked');
            if (!appData.afternoonMode) appData.afternoonMode = {};
            appData.afternoonMode[userKey] = afternoonModeEl?.value || 'time';
            saveData();
            showAlert('✅ 저장 완료', `시간표 설정이 저장되었습니다!\n(점심: ${lunchAfter}교시 후)`);
            closeSettings();
            renderCalendar();
        }
        
        function updateAfternoonDisplay() {
            // 향후 구현: 오후 시간대 표시 방식 변경
            showAlert('🚧 준비 중', '이 기능은 곧 추가될 예정입니다!');
        }
        
        function toggleChildSelector(event) {
            if (event) event.stopPropagation();
            
            const selector = document.getElementById('childSelector');
            const isShowing = selector.classList.contains('show');
            
            if (!isShowing) {
                selector.classList.add('show');
                renderChildSelector();
            } else {
                selector.classList.remove('show');
            }
        }
        
        function renderChildSelector() {
            const userInfo = getUserInfo(currentUser.nickname, currentUser.phone);
            const selector = document.getElementById('childSelector');
            
            if (!userInfo.children) {
                userInfo.children = [];
            }
            
            let html = '';
            
            userInfo.children.forEach(child => {
                const isActive = child.id === currentChildId ? 'active' : '';
                html += `
                    <div class="child-option ${isActive}" onclick="selectChild(event, '${child.id}')">
                        ${child.name} (${child.grade}학년)
                    </div>
                `;
            });
            
            html += `
                <div class="child-option add-child-option" onclick="showAddChild(event)">
                    + 다른 시간표 추가
                </div>
            `;
            
            selector.innerHTML = html;
        }
        
        function selectChild(event, childId) {
            if (event) event.stopPropagation();
            
            currentChildId = childId;
            currentDayFilter = 'all'; // 전체보기로 리셋
            document.getElementById('childSelector').classList.remove('show');
            updateHeaderTitle();
            renderCalendar();
        }
        
        function updateHeaderTitle() {
            const userInfo = getUserInfo(currentUser.nickname, currentUser.phone);
            
            if (!userInfo.children || userInfo.children.length === 0) {
                document.getElementById('headerTitle').innerHTML = '시간표';
                return;
            }
            
            const currentChild = userInfo.children.find(c => c.id === currentChildId);
            if (!currentChild) {
                currentChildId = userInfo.children[0].id;
                const child = userInfo.children[0];
                document.getElementById('headerTitle').innerHTML = `
                    ${child.name}의 시간표 ▼
                    <div class="child-selector" id="childSelector"></div>
                `;
            } else {
                document.getElementById('headerTitle').innerHTML = `
                    ${currentChild.name}의 시간표 ▼
                    <div class="child-selector" id="childSelector"></div>
                `;
            }
        }
        
        function showAddChild(event) {
            if (event) event.stopPropagation();
            document.getElementById('childSelector').classList.remove('show');
            document.getElementById('addChildModal').style.display = 'block';
        }
        
        function closeAddChild() {
            document.getElementById('addChildModal').style.display = 'none';
            document.getElementById('newChildName').value = '';
        }
        
        function addChild() {
            const userInfo = getUserInfo(currentUser.nickname, currentUser.phone);
            const name = document.getElementById('newChildName').value.trim();
            const grade = document.getElementById('newChildGrade').value;
            
            if (!name) {
                showAlert('⚠️ 입력 오류', '이름을 입력해주세요.');
                return;
            }
            
            const childId = Date.now().toString();
            
            if (!userInfo.children) {
                userInfo.children = [];
            }
            
            userInfo.children.push({
                id: childId,
                name: name,
                grade: grade
            });
            
            // 새 자녀의 스케줄 초기화
            appData.schedules[childId] = {
                월: [], 화: [], 수: [], 목: [], 금: [], 토: []
            };
            appData.subjectColors[childId] = {};
            
            saveData();
            
            // 새로 추가한 자녀로 전환
            currentChildId = childId;
            
            closeAddChild();
            updateHeaderTitle();
            renderCalendar();
            
            showAlert('✅ 추가 완료', `${name}의 시간표가 추가되었습니다!`);
        }
        
        // 외부 클릭 시 셀렉터 닫기
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-title')) {
                const selectors = document.querySelectorAll('.child-selector');
                selectors.forEach(s => s.classList.remove('show'));
            }
        });
        
        // 커스텀 알림 함수
        function showAlert(title, message) {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').innerHTML = message; // HTML 렌더링
            document.getElementById('alertModal').style.display = 'flex';
        }
        
        function hideAlert() {
            document.getElementById('alertModal').style.display = 'none';
        }
        
        // 전화번호 자동 포맷팅 (1234-5678)
        function formatPhoneNumber(input) {
            let value = input.value.replace(/[^0-9]/g, ''); // 숫자만
            
            if (value.length > 4) {
                value = value.slice(0, 4) + '-' + value.slice(4, 8);
            }
            
            input.value = value;
        }

        init();
    </script>
</body>
</html>
