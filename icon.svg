<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 흰색 배경 -->
  <rect width="512" height="512" fill="white"/>
  
  <!-- 달력 본체 -->
  <rect x="90" y="110" width="332" height="312" fill="#2C3E50" rx="20"/>
  
  <!-- 상단 링 (왼쪽) -->
  <rect x="180" y="60" width="30" height="80" fill="#2C3E50" rx="15"/>
  <circle cx="195" cy="130" r="20" fill="white"/>
  <circle cx="195" cy="130" r="12" fill="#2C3E50"/>
  
  <!-- 상단 링 (오른쪽) -->
  <rect x="302" y="60" width="30" height="80" fill="#2C3E50" rx="15"/>
  <circle cx="317" cy="130" r="20" fill="white"/>
  <circle cx="317" cy="130" r="12" fill="#2C3E50"/>
  
  <!-- 흰색 내부 영역 -->
  <rect x="110" y="190" width="292" height="212" fill="white" rx="8"/>
  
  <!-- 날짜 블록 (4x3 그리드) -->
  <!-- 첫 번째 줄 -->
  <rect x="130" y="210" width="50" height="45" fill="#2C3E50" rx="8"/>
  <rect x="200" y="210" width="50" height="45" fill="#2C3E50" rx="8"/>
  <rect x="270" y="210" width="50" height="45" fill="#2C3E50" rx="8"/>
  <rect x="340" y="210" width="50" height="45" fill="#2C3E50" rx="8"/>
  
  <!-- 두 번째 줄 -->
  <rect x="130" y="275" width="50" height="45" fill="#2C3E50" rx="8"/>
  <rect x="200" y="275" width="50" height="45" fill="#2C3E50" rx="8"/>
  <rect x="270" y="275" width="50" height="45" fill="#2C3E50" rx="8"/>
  <rect x="340" y="275" width="50" height="45" fill="#2C3E50" rx="8"/>
  
  <!-- 세 번째 줄 -->
  <rect x="130" y="340" width="50" height="45" fill="#2C3E50" rx="8"/>
  <rect x="200" y="340" width="50" height="45" fill="#2C3E50" rx="8"/>
  <rect x="270" y="340" width="50" height="45" fill="#2C3E50" rx="8"/>
</svg>